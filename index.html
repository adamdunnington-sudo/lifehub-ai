<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeHub AI</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
      background:#F2F2F7;
      color:#000;
    }

    header{
      padding:60px 25px 30px;
    }

    h1{
      margin:0;
      font-size:38px;
      font-weight:700;
    }

    h2{
      margin-top:6px;
      color:#6e6e73;
      font-weight:500;
    }

    .cards{
      padding:20px;
      display:grid;
      gap:18px;
    }

    .card{
      background:white;
      border-radius:22px;
      padding:22px;
      box-shadow:0 5px 18px rgba(0,0,0,.08);
    }

    .emoji{
      font-size:34px;
    }

    .title{
      font-size:22px;
      font-weight:600;
      margin-top:10px;
    }

    .subtitle{
      color:#666;
      margin-top:8px;
    }

    footer{
      text-align:center;
      color:#888;
      padding:40px;
    }
  </style>
<link rel="stylesheet" href="styles.css">

<link rel="manifest" href="manifest.json">

<script src="app.js" defer></script>
</head>

<body>

<header>

<h1>👋 Good Evening Adam</h1>

<h2>Welcome to LifeHub AI</h2>

</header>

<div class="cards">

<div class="card">

<div class="emoji">🌤️</div>

<div class="title">Weather</div>

<div class="subtitle">
Weather integration coming soon.
</div>

</div>

<div class="card">

<div class="emoji">📅</div>

<div class="title">Today's Schedule</div>

<div class="subtitle">
Your calendar will appear here.
</div>

</div>

<div class="card">

<div class="emoji">📧</div>

<div class="title">Inbox</div>

<div class="subtitle">
Important emails only.
</div>

</div>

<div class="card">

<div class="emoji">👨‍👩‍👧‍👦</div>

<div class="title">Family</div>

<div class="subtitle">
Your family's day at a glance.
</div>

</div>

</div>

<footer>

LifeHub AI v0.1

</footer>

</body>

</html>
